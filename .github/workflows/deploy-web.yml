name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: TOGESC/togesc
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter pub get
          DART_DEFINES=""
          if [ -n "$SUPABASE_URL" ]; then
            DART_DEFINES="$DART_DEFINES --dart-define=SUPABASE_URL=$SUPABASE_URL"
          fi
          if [ -n "$SUPABASE_ANON_KEY" ]; then
            DART_DEFINES="$DART_DEFINES --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          fi
          flutter build web --release --no-wasm-dry-run $DART_DEFINES

      - name: Prepare Vercel prebuilt output
        run: |
          mkdir -p .vercel/output/static
          cp -r TOGESC/togesc/build/web/* .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes --token "${{ secrets.VERCEL_TOKEN }}" --scope raikadiers-projects
        env:
          VERCEL_ORG_ID: team_Onzafu620lCGiGTiRG2q6EqI
          VERCEL_PROJECT_ID: prj_mcEytSx6ejlf20aWtIutrGayXyUn
