name: togesc
description: "TOGESC - TOne GEneration SCript. Entrenador de oido absoluto."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  flutter_soloud: ^2.0.0
  go_router: ^17.3.0
  shared_preferences: ^2.3.0
  supabase_flutter: ^2.9.1
  url_launcher: ^6.3.0
  purchases_flutter: ^8.1.0
  sentry_flutter: ^8.14.0
  flutter_local_notifications: 19.5.0
  web: ^1.1.0
  google_fonts: ^6.2.1
  record: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#4E0078"
  adaptive_icon_foreground: assets/app_icon.png
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#4E0078"
    theme_color: "#4E0078"
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app_icon.png
